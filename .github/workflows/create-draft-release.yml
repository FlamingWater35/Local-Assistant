name: Build, Release, and Deploy

on:
  push:
    branches: [main]

env:
  REPO_NAME: Local-Assistant
  APP_NAME: Local-Assistant

jobs:
  build_android:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Get version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Retrieved Version: $VERSION"

      - name: Decode and Create Keystore File
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks

      - name: Create key.properties File
        run: |
          echo "storePassword=${{ secrets.KEY_STORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=../upload-keystore.jks" >> android/key.properties

      - uses: actions/setup-java@v5
        with: { distribution: "temurin", java-version: "17" }

      - uses: subosito/flutter-action@v2
        with: { channel: "stable", cache: true }

      - run: flutter clean
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs && dart run slang

      - run: flutter build apk --release --target-platform android-arm64

      - name: Prepare APKs for Release
        run: |
          cd build/app/outputs/apk/release
          new_name="${{ env.APP_NAME }}-v${{ steps.get_version.outputs.version }}-arm64-v8a.apk"
          mv app-release.apk "$new_name"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/apk/release/*.apk

  create_release:
    runs-on: ubuntu-latest
    needs: [build_android]
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "artifacts/**/*.apk"
          draft: true
          allowUpdates: true
          tag: "dev-build-${{ github.run_number }}"
          name: "Version ${{ needs.build_android.outputs.app_version }}"
          body: |
            Automated development build.
            Triggered by commit: `${{ github.sha }}`
